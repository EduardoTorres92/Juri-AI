databases:
  - name: juri-ai-db
    plan: free
    region: oregon
    postgresMajorVersion: 16

services:
  - type: web
    name: juri-ai
    runtime: python
    region: oregon
    plan: free
    buildCommand: ./build.sh
    startCommand: gunicorn core.wsgi:application -c gunicorn.conf.py
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: juri-ai-db
          property: connectionString
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://juri-ai.onrender.com"
      - key: WEB_CONCURRENCY
        value: "2"
      - key: OPENAI_API_KEY
        sync: false
      - key: DATAJUD_API_KEY
        sync: false
      - key: ASAAS_API_KEY
        sync: false
