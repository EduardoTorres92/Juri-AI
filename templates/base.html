<!DOCTYPE html>
<html lang="pt-BR" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}JuriAI{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: {} }
    }
  </script>
  {% block 'head' %}{% endblock 'head' %}
</head>
<body class="h-full bg-slate-50 dark:bg-slate-900 text-slate-900 dark:text-white antialiased">
  {% if user.is_authenticated %}
  <nav class="border-b border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800">
    <div class="w-full px-4 sm:px-6 lg:px-8">
      <div class="flex h-14 items-center justify-between">
        <div class="flex items-center gap-6">
          <a href="{% url 'dashboard' %}" class="text-sm font-medium text-slate-700 dark:text-slate-300 hover:text-violet-600 dark:hover:text-violet-400">Painel</a>
          <a href="{% url 'clientes' %}" class="text-sm font-medium text-slate-700 dark:text-slate-300 hover:text-violet-600 dark:hover:text-violet-400">Clientes</a>
          <a href="{% url 'areas_list' %}" class="text-sm font-medium text-slate-700 dark:text-slate-300 hover:text-violet-600 dark:hover:text-violet-400">Áreas de Atuação</a>
        </div>
        <div class="flex items-center gap-4">
          <span class="text-sm text-slate-500 dark:text-slate-400">{{ user.get_full_name|default:user.username }}</span>
          <a href="{% url 'logout' %}" class="text-sm font-medium text-slate-700 dark:text-slate-300 hover:text-violet-600 dark:hover:text-violet-400">Sair</a>
        </div>
      </div>
    </div>
  </nav>
  {% endif %}

  {% if messages %}
  <div class="w-full px-4 py-2 sm:px-6 lg:px-8">
    {% for message in messages %}
    <div class="rounded-lg p-3 mb-2 {{ message.tags }}">{{ message }}</div>
    {% endfor %}
  </div>
  {% endif %}

  {% block 'body' %}{% endblock 'body' %}
</body>
</html>
