{% extends 'base.html' %}
{% block 'body' %}
<main class="flex min-h-screen flex-col items-center justify-center bg-slate-50 px-4 dark:bg-slate-900 sm:px-6 lg:px-8">
  <div class="mx-auto max-w-lg text-center">
    <div class="mx-auto mb-6 flex h-20 w-20 items-center justify-center rounded-2xl bg-violet-100 dark:bg-violet-900/30">
      <svg class="h-10 w-10 text-violet-600 dark:text-violet-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
      </svg>
    </div>
    <h1 class="text-2xl font-bold text-slate-900 dark:text-white">{{ titulo }}</h1>
    <p class="mt-3 text-slate-600 dark:text-slate-400">{{ descricao }}</p>
    <p class="mt-4 inline-flex items-center gap-2 rounded-full bg-amber-100 px-4 py-2 text-sm font-medium text-amber-800 dark:bg-amber-900/30 dark:text-amber-400">
      <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
      </svg>
      Em breve
    </p>
  </div>
</main>
{% endblock 'body' %}
