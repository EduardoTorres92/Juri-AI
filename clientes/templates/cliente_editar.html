{% extends 'base.html' %}
{% block 'body' %}
<div class="flex min-h-screen flex-col gap-6 p-6 sm:p-8 lg:p-10">
  <div class="flex flex-shrink-0 justify-between items-center">
    <div>
      <h1 class="text-3xl font-semibold tracking-tight text-slate-900 dark:text-white">Editar cliente</h1>
      <p class="text-slate-500 dark:text-slate-400 mt-1">{{ cliente.nome }}</p>
    </div>
    <a href="{% url 'cliente' cliente.id %}" class="rounded-xl border border-slate-200 dark:border-slate-600 px-4 py-2.5 text-sm font-medium text-slate-700 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">
      Voltar
    </a>
  </div>

  {% if messages %}
  <div class="flex-shrink-0">
    {% for message in messages %}
    <div class="rounded-xl p-4 {% if 'green' in message.tags %}bg-emerald-50 text-emerald-800 border border-emerald-200{% elif 'red' in message.tags %}bg-red-50 text-red-800 border border-red-200{% else %}bg-slate-50 text-slate-800 border border-slate-200{% endif %}">
      {{ message }}
    </div>
    {% endfor %}
  </div>
  {% endif %}

  <div class="flex-1 rounded-2xl bg-white dark:bg-slate-800 shadow-sm ring-1 ring-slate-200 dark:ring-slate-700/50 p-6 max-w-2xl">
    <form action="{% url 'cliente_editar' cliente.id %}" method="POST" class="space-y-4">
      {% csrf_token %}
      <div>
        <label for="nome" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Nome</label>
        <input type="text" name="nome" id="nome" value="{{ cliente.nome }}" required
          class="w-full border border-slate-200 dark:border-slate-600 rounded-xl px-4 py-2.5 text-sm bg-white dark:bg-slate-800 text-slate-900 dark:text-white focus:ring-2 focus:ring-violet-500 outline-none">
      </div>
      <div>
        <label for="email" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">E-mail</label>
        <input type="email" name="email" id="email" value="{{ cliente.email }}" required
          class="w-full border border-slate-200 dark:border-slate-600 rounded-xl px-4 py-2.5 text-sm bg-white dark:bg-slate-800 text-slate-900 dark:text-white focus:ring-2 focus:ring-violet-500 outline-none">
      </div>
      <div>
        <label for="cpf_cnpj" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">CPF/CNPJ</label>
        <input type="text" name="cpf_cnpj" id="cpf_cnpj" value="{{ cliente.cpf_cnpj }}"
          class="w-full border border-slate-200 dark:border-slate-600 rounded-xl px-4 py-2.5 text-sm bg-white dark:bg-slate-800 text-slate-900 dark:text-white focus:ring-2 focus:ring-violet-500 outline-none" placeholder="Apenas números">
      </div>
      <div>
        <label for="telefone" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Telefone</label>
        <input type="text" name="telefone" id="telefone" value="{{ cliente.telefone }}"
          class="w-full border border-slate-200 dark:border-slate-600 rounded-xl px-4 py-2.5 text-sm bg-white dark:bg-slate-800 text-slate-900 dark:text-white focus:ring-2 focus:ring-violet-500 outline-none" placeholder="(11) 99999-0000">
      </div>
      <div>
        <label for="tipo" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Tipo</label>
        <select name="tipo" id="tipo" required
          class="w-full border border-slate-200 dark:border-slate-600 rounded-xl px-4 py-2.5 text-sm bg-white dark:bg-slate-800 text-slate-900 dark:text-white focus:ring-2 focus:ring-violet-500 outline-none">
          <option value="PF" {% if cliente.tipo == 'PF' %}selected{% endif %}>Pessoa Física</option>
          <option value="PJ" {% if cliente.tipo == 'PJ' %}selected{% endif %}>Pessoa Jurídica</option>
        </select>
      </div>
      <div class="flex gap-6">
        <label class="flex items-center gap-2 cursor-pointer">
          <input type="checkbox" name="status" id="status" {% if cliente.status %}checked{% endif %}
            class="h-4 w-4 text-violet-600 focus:ring-violet-500 border-slate-300 rounded">
          <span class="text-sm text-gray-700 dark:text-gray-300">Cliente ativo</span>
        </label>
        <label class="flex items-center gap-2 cursor-pointer">
          <input type="checkbox" name="vip" id="vip" {% if cliente.vip %}checked{% endif %}
            class="h-4 w-4 text-violet-600 focus:ring-violet-500 border-slate-300 rounded">
          <span class="text-sm text-gray-700 dark:text-gray-300">VIP</span>
        </label>
      </div>
      <div class="flex gap-3 pt-4">
        <a href="{% url 'cliente' cliente.id %}" class="flex-1 text-center border border-slate-200 dark:border-slate-600 text-slate-700 dark:text-slate-300 px-4 py-2.5 rounded-xl text-sm font-medium hover:bg-slate-50 dark:hover:bg-slate-700/50 transition-colors">
          Cancelar
        </a>
        <button type="submit" class="flex-1 bg-violet-600 text-white px-4 py-2.5 rounded-xl text-sm font-medium hover:bg-violet-500 transition-colors">
          Salvar
        </button>
      </div>
    </form>
  </div>
</div>
{% endblock 'body' %}
